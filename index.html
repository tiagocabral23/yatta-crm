<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMC | Intelligence in Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:    #0a0a0b;
    --charcoal: #111114;
    --card-bg:  #0f0f12;
    --border:   rgba(255,255,255,0.07);
    --silver:   #c8cdd4;
    --silver-hi:#e8edf2;
    --silver-lo:#7a8390;
    --accent:   #8fa3b8;
    --white:    #f0f2f4;
    --danger:   #c0392b;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  /* ── CANVAS DE REDE ── */
  #net-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GRAIN OVERLAY ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
    z-index: 1;
  }

  /* ── LAYOUT ── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 52px 48px 44px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 40px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(100,130,160,0.04);
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* card top line accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,200,220,0.4), transparent);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── LOGO BLOCO ── */
  .logo-block {
    text-align: center;
    margin-bottom: 36px;
    animation: rise 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-svg-wrap {
    display: block;
    width: 100%;
    max-width: 310px;
    margin: 0 auto;
    overflow: visible;
  }

  .tmc-light-sweep {
    animation: sweep-move 7s cubic-bezier(0.4,0,0.2,1) infinite 2.5s;
  }
  @keyframes sweep-move {
    0%   { transform: translateX(-300px); opacity: 0; }
    4%   { opacity: 1; }
    38%  { transform: translateX(300px); opacity: 1; }
    42%  { opacity: 0; }
    100% { transform: translateX(300px); opacity: 0; }
  }

  /* ── TAGLINE ── */
  .tagline {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.35em;
    color: var(--silver-lo);
    text-transform: uppercase;
    display: block;
    margin-top: 10px;
  }

  /* ── ACESSO LABEL ── */
  .access-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--silver-lo);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: block;
    animation: rise 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── FORM ── */
  .form { animation: rise 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) both; }

  .field {
    position: relative;
    margin-bottom: 14px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 3px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.03em;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    -webkit-text-fill-color: var(--white);
  }

  .field input::placeholder {
    color: rgba(180,190,200,0.3);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .field input:focus {
    border-color: rgba(160,185,210,0.4);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(120,160,200,0.07);
  }

  .field input.error {
    border-color: rgba(192,57,43,0.5);
  }

  /* ── BTN ── */
  .btn-primary {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    background: linear-gradient(135deg, #1e2830 0%, #283340 50%, #1a2228 100%);
    border: 1px solid rgba(160,185,210,0.25);
    border-radius: 3px;
    color: var(--silver-hi);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(180,210,230,0.08) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-primary:hover {
    border-color: rgba(180,205,225,0.45);
    color: #fff;
    box-shadow: 0 4px 24px rgba(100,150,190,0.12), 0 0 0 1px rgba(180,205,225,0.15);
    transform: translateY(-1px);
  }

  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active { transform: translateY(0); }

  /* ── FOOTER LINKS ── */
  .form-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--silver-lo);
    animation: rise 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  .form-footer a {
    color: var(--silver);
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid rgba(180,195,210,0.25);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }

  .form-footer a:hover {
    color: var(--silver-hi);
    border-color: rgba(220,230,240,0.5);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 22px;
    opacity: 0.4;
  }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider em { font-style: normal; font-size: 10px; letter-spacing: 0.2em; color: var(--silver-lo); }

  /* ── BOTTOM MARK ── */
  .bottom-mark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    white-space: nowrap;
    z-index: 3;

    background: linear-gradient(
      90deg,
      #6a7a88 0%,
      #a8b8c4 20%,
      #d8e4ec 40%,
      #f0f4f7 50%,
      #d8e4ec 60%,
      #a8b8c4 80%,
      #6a7a88 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: silver-flow 6s linear infinite;
    filter: drop-shadow(0 0 8px rgba(180,210,230,0.2));
  }

  @keyframes silver-flow {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* ── ERROR MSG ── */
  .error-msg {
    font-size: 11px;
    color: #e07070;
    margin-top: 10px;
    letter-spacing: 0.03em;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* ── LOADING SPINNER ── */
  .btn-primary .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--silver-hi);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  .btn-primary.loading .spinner { display: inline-block; }
  .btn-primary.loading .btn-text { opacity: 0.6; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    .card { padding: 40px 28px 36px; }
    .logo-tmc { font-size: 72px; }
  }
</style>
</head>
<body>

<canvas id="net-canvas"></canvas>

<div class="stage">
  <div class="card">
    <div class="logo-block">
      <svg class="logo-svg-wrap" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
        <defs>

          <!-- Metal escovado: listras horizontais finas + gradiente vertical claro no centro -->
          <linearGradient id="metal-base" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#28363f"/>
            <stop offset="8%"   stop-color="#5a6e7c"/>
            <stop offset="18%"  stop-color="#96aab6"/>
            <stop offset="28%"  stop-color="#c4d4de"/>
            <stop offset="36%"  stop-color="#e2ecf2"/>
            <stop offset="42%"  stop-color="#f4f8fa"/>
            <stop offset="48%"  stop-color="#ffffff"/>
            <stop offset="52%"  stop-color="#f0f5f8"/>
            <stop offset="60%"  stop-color="#d0dce6"/>
            <stop offset="70%"  stop-color="#a2b4c0"/>
            <stop offset="82%"  stop-color="#6a7e8c"/>
            <stop offset="92%"  stop-color="#3e5060"/>
            <stop offset="100%" stop-color="#1e2c38"/>
          </linearGradient>

          <!-- Striação horizontal (metal escovado) -->
          <pattern id="brush" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
            <rect width="1" height="3" fill="transparent"/>
            <rect y="1" width="1" height="0.6" fill="white" opacity="0.06"/>
          </pattern>

          <!-- Combina metal base + striação -->
          <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#28363f"/>
            <stop offset="8%"   stop-color="#5a6e7c"/>
            <stop offset="20%"  stop-color="#9aaebb"/>
            <stop offset="30%"  stop-color="#c8d8e2"/>
            <stop offset="38%"  stop-color="#e4eef4"/>
            <stop offset="45%"  stop-color="#f6fafb"/>
            <stop offset="50%"  stop-color="#ffffff"/>
            <stop offset="55%"  stop-color="#eaf2f6"/>
            <stop offset="64%"  stop-color="#ccdae4"/>
            <stop offset="75%"  stop-color="#9ab0bc"/>
            <stop offset="88%"  stop-color="#607888"/>
            <stop offset="100%" stop-color="#1e2c38"/>
          </linearGradient>

          <!-- Sombra projetada diagonal: baixo-esquerda, dura e suave -->
          <filter id="drop" x="-15%" y="-10%" width="140%" height="160%">
            <feDropShadow dx="-4" dy="6" stdDeviation="4"   flood-color="#000" flood-opacity="0.80"/>
            <feDropShadow dx="-1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.45"/>
          </filter>

          <!-- Bevel: aresta superior clara, aresta inferior escura -->
          <filter id="bevel" x="-5%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="0" result="blur"/>
            <feFlood flood-color="#ffffff" flood-opacity="0.7" result="wh"/>
            <feFlood flood-color="#000000" flood-opacity="0.6" result="bl"/>
            <feComposite in="wh" in2="SourceAlpha" operator="in" result="wh2"/>
            <feComposite in="bl" in2="SourceAlpha" operator="in" result="bl2"/>
            <feOffset in="wh2" dx="0" dy="-1.5" result="top-edge"/>
            <feOffset in="bl2" dx="0" dy="1.5"  result="bot-edge"/>
            <feMerge>
              <feMergeNode in="bot-edge"/>
              <feMergeNode in="SourceGraphic"/>
              <feMergeNode in="top-edge"/>
            </feMerge>
          </filter>

          <!-- Máscara das letras para confinar a luz -->
          <mask id="tmc-mask">
            <text x="150" y="82" text-anchor="middle"
              font-family="'Russo One', sans-serif"
              font-size="86" letter-spacing="6"
              fill="white">TMC</text>
          </mask>

          <!-- Faixa de luz: estreita, inclinada 15°, fria -->
          <linearGradient id="sweep-grad" x1="0" y1="0" x2="1" y2="0" gradientTransform="rotate(12,0.5,0.5)">
            <stop offset="0%"   stop-color="white" stop-opacity="0"/>
            <stop offset="40%"  stop-color="white" stop-opacity="0"/>
            <stop offset="46%"  stop-color="#deeef8" stop-opacity="0.3"/>
            <stop offset="49%"  stop-color="white"  stop-opacity="0.7"/>
            <stop offset="50.5%" stop-color="white" stop-opacity="0.9"/>
            <stop offset="52%"  stop-color="white"  stop-opacity="0.7"/>
            <stop offset="55%"  stop-color="#deeef8" stop-opacity="0.3"/>
            <stop offset="62%"  stop-color="white" stop-opacity="0"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </linearGradient>

        </defs>

        <!-- Sombra projetada — offset diagonal -->
        <text x="154" y="87" text-anchor="middle"
          font-family="'Russo One', sans-serif"
          font-size="86" letter-spacing="6"
          fill="#040608"
          style="filter:blur(5px)" opacity="0.85">TMC</text>

        <!-- Texto metálico principal com bevel + drop shadow -->
        <text x="150" y="82" text-anchor="middle"
          font-family="'Russo One', sans-serif"
          font-size="86" letter-spacing="6"
          fill="url(#metal)"
          filter="url(#drop) url(#bevel)">TMC</text>

        <!-- Striação escovada sobreposta -->
        <text x="150" y="82" text-anchor="middle"
          font-family="'Russo One', sans-serif"
          font-size="86" letter-spacing="6"
          fill="url(#brush)"
          opacity="0.4">TMC</text>

        <!-- Faixa de luz varrendo da esquerda para direita -->
        <rect class="tmc-light-sweep"
          x="-150" y="0" width="300" height="100"
          fill="url(#sweep-grad)"
          mask="url(#tmc-mask)"/>

      </svg>
      <span class="tagline">Intelligence in Motion</span>
    </div>

    <span class="access-label">Acesso à Plataforma</span>

    <form class="form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <input type="email" id="email" placeholder="E-mail corporativo" autocomplete="email" spellcheck="false">
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
      </div>

      <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">Entrar no Sistema</span>
      </button>
    </form>

    <div class="divider">
      <span></span>
      <em>ou</em>
      <span></span>
    </div>

    <div class="form-footer">
      Novo por aqui? <a href="#">Cadastrar nova empresa</a>
    </div>
  </div>
</div>

<div class="bottom-mark">Think &nbsp;·&nbsp; Move &nbsp;·&nbsp; Convert</div>

<script>
/* ── REDE DE CONEXÕES (inspirado no cartão) ── */
(function() {
  const canvas = document.getElementById('net-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], RAF;

  const NODE_COUNT  = 55;
  const MAX_DIST    = 160;
  const NODE_COLOR  = 'rgba(120,145,165,';
  const LINE_COLOR  = 'rgba(100,130,155,';

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createNodes() {
    nodes = [];
    for (let i = 0; i < NODE_COUNT; i++) {
      nodes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r:  Math.random() * 1.5 + 0.5,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // move
    for (const n of nodes) {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }

    // edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX_DIST) {
          const alpha = (1 - d / MAX_DIST) * 0.22;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = LINE_COLOR + alpha + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // dots
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = NODE_COLOR + '0.5)';
      ctx.fill();
    }

    RAF = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createNodes(); });
  resize(); createNodes(); draw();
})();

/* ── LOGIN HANDLER ── */
function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  err.classList.remove('visible');
  btn.classList.add('loading');
  btn.disabled = true;

  // Simulação — substitua por fetch real
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.disabled = false;
    // Para mostrar erro: err.classList.add('visible');
    // Para redirecionar: window.location.href = '/dashboard';
  }, 1800);
}

/* ── INPUT CLEAR ON FOCUS ── */
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('focus', () => inp.classList.remove('error'));
});
</script>
</body>
</html>
