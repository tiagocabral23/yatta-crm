<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMC | Intelligence in Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:    #0a0a0b;
    --charcoal: #111114;
    --card-bg:  #0f0f12;
    --border:   rgba(255,255,255,0.07);
    --silver:   #c8cdd4;
    --silver-hi:#e8edf2;
    --silver-lo:#7a8390;
    --accent:   #8fa3b8;
    --white:    #f0f2f4;
    --danger:   #c0392b;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  /* ── CANVAS DE REDE ── */
  #net-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GRAIN OVERLAY ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
    z-index: 1;
  }

  /* ── LAYOUT ── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 52px 48px 44px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 40px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(100,130,160,0.04);
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* card top line accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,200,220,0.4), transparent);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── LOGO BLOCO ── */
  .logo-block {
    text-align: center;
    margin-bottom: 40px;
    animation: rise 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── TMC ALTO RELEVO METÁLICO ── */
  .logo-tmc-wrap {
    position: relative;
    display: inline-block;
    line-height: 1;
  }

  /* Camada de sombra/profundidade — cria a ilusão de relevo */
  .logo-tmc-wrap::before {
    content: 'TMC';
    font-family: 'Russo One', sans-serif;
    font-size: clamp(72px, 12vw, 96px);
    letter-spacing: 0.14em;
    position: absolute;
    top: 3px; left: 2px;
    background: linear-gradient(180deg, #1a2228 0%, #0a0e12 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    pointer-events: none;
    z-index: 0;
    filter: blur(1.5px);
    opacity: 0.9;
  }

  .logo-tmc {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(72px, 12vw, 96px);
    letter-spacing: 0.14em;
    line-height: 1;
    display: block;
    position: relative;
    z-index: 1;

    /* Metal escovado: claro no meio, escuro nas bordas — alto relevo clássico */
    background: linear-gradient(
      180deg,
      #4a5a68  0%,
      #8a9dac  10%,
      #c2d0da  22%,
      #e8eef3  32%,
      #f5f8fa  40%,
      #ffffff  46%,
      #e2eaf0  52%,
      #b8c8d4  62%,
      #7a8e9c  74%,
      #4e6070  85%,
      #344048  100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    /* Relevo: borda clara no topo, escura embaixo */
    filter:
      drop-shadow(0 -1px 0px rgba(255,255,255,0.5))
      drop-shadow(0  2px 2px rgba(0,0,0,0.7));
  }

  /* Luz que passa pelas letras — faixa fina e elegante */
  .logo-tmc::after {
    content: 'TMC';
    position: absolute;
    inset: 0;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    line-height: inherit;

    background: linear-gradient(
      105deg,
      transparent    0%,
      transparent   30%,
      rgba(255,255,255,0.0) 40%,
      rgba(220,235,245,0.4) 46%,
      rgba(255,255,255,0.75) 50%,
      rgba(220,235,245,0.4) 54%,
      rgba(255,255,255,0.0) 60%,
      transparent   70%,
      transparent  100%
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: light-pass 6s cubic-bezier(0.4, 0, 0.2, 1) infinite 1.5s;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes light-pass {
    0%   { background-position: -200% 0; }
    35%  { background-position: 300% 0; }
    100% { background-position: 300% 0; }
  }

  .tagline {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.35em;
    color: var(--silver-lo);
    text-transform: uppercase;
    display: block;
    margin-top: 6px;
  }

  /* ── ACESSO LABEL ── */
  .access-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--silver-lo);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: block;
    animation: rise 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── FORM ── */
  .form { animation: rise 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) both; }

  .field {
    position: relative;
    margin-bottom: 14px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 3px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.03em;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    -webkit-text-fill-color: var(--white);
  }

  .field input::placeholder {
    color: rgba(180,190,200,0.3);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .field input:focus {
    border-color: rgba(160,185,210,0.4);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(120,160,200,0.07);
  }

  .field input.error {
    border-color: rgba(192,57,43,0.5);
  }

  /* ── BTN ── */
  .btn-primary {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    background: linear-gradient(135deg, #1e2830 0%, #283340 50%, #1a2228 100%);
    border: 1px solid rgba(160,185,210,0.25);
    border-radius: 3px;
    color: var(--silver-hi);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(180,210,230,0.08) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-primary:hover {
    border-color: rgba(180,205,225,0.45);
    color: #fff;
    box-shadow: 0 4px 24px rgba(100,150,190,0.12), 0 0 0 1px rgba(180,205,225,0.15);
    transform: translateY(-1px);
  }

  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active { transform: translateY(0); }

  /* ── FOOTER LINKS ── */
  .form-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--silver-lo);
    animation: rise 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  .form-footer a {
    color: var(--silver);
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid rgba(180,195,210,0.25);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }

  .form-footer a:hover {
    color: var(--silver-hi);
    border-color: rgba(220,230,240,0.5);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 22px;
    opacity: 0.4;
  }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider em { font-style: normal; font-size: 10px; letter-spacing: 0.2em; color: var(--silver-lo); }

  /* ── BOTTOM MARK ── */
  .bottom-mark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    white-space: nowrap;
    z-index: 3;

    background: linear-gradient(
      90deg,
      #6a7a88 0%,
      #a8b8c4 20%,
      #d8e4ec 40%,
      #f0f4f7 50%,
      #d8e4ec 60%,
      #a8b8c4 80%,
      #6a7a88 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: silver-flow 6s linear infinite;
    filter: drop-shadow(0 0 8px rgba(180,210,230,0.2));
  }

  @keyframes silver-flow {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* ── ERROR MSG ── */
  .error-msg {
    font-size: 11px;
    color: #e07070;
    margin-top: 10px;
    letter-spacing: 0.03em;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* ── LOADING SPINNER ── */
  .btn-primary .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--silver-hi);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  .btn-primary.loading .spinner { display: inline-block; }
  .btn-primary.loading .btn-text { opacity: 0.6; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    .card { padding: 40px 28px 36px; }
    .logo-tmc { font-size: 72px; }
  }
</style>
</head>
<body>

<canvas id="net-canvas"></canvas>

<div class="stage">
  <div class="card">
    <div class="logo-block">
      <div class="logo-tmc-wrap">
        <span class="logo-tmc">TMC</span>
      </div>
      <span class="tagline">Intelligence in Motion</span>
    </div>

    <span class="access-label">Acesso à Plataforma</span>

    <form class="form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <input type="email" id="email" placeholder="E-mail corporativo" autocomplete="email" spellcheck="false">
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
      </div>

      <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">Entrar no Sistema</span>
      </button>
    </form>

    <div class="divider">
      <span></span>
      <em>ou</em>
      <span></span>
    </div>

    <div class="form-footer">
      Novo por aqui? <a href="#">Cadastrar nova empresa</a>
    </div>
  </div>
</div>

<div class="bottom-mark">Think &nbsp;·&nbsp; Move &nbsp;·&nbsp; Convert</div>

<script>
/* ── REDE DE CONEXÕES (inspirado no cartão) ── */
(function() {
  const canvas = document.getElementById('net-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], RAF;

  const NODE_COUNT  = 55;
  const MAX_DIST    = 160;
  const NODE_COLOR  = 'rgba(120,145,165,';
  const LINE_COLOR  = 'rgba(100,130,155,';

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createNodes() {
    nodes = [];
    for (let i = 0; i < NODE_COUNT; i++) {
      nodes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r:  Math.random() * 1.5 + 0.5,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // move
    for (const n of nodes) {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }

    // edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX_DIST) {
          const alpha = (1 - d / MAX_DIST) * 0.22;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = LINE_COLOR + alpha + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // dots
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = NODE_COLOR + '0.5)';
      ctx.fill();
    }

    RAF = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createNodes(); });
  resize(); createNodes(); draw();
})();

/* ── LOGIN HANDLER ── */
function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  err.classList.remove('visible');
  btn.classList.add('loading');
  btn.disabled = true;

  // Simulação — substitua por fetch real
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.disabled = false;
    // Para mostrar erro: err.classList.add('visible');
    // Para redirecionar: window.location.href = '/dashboard';
  }, 1800);
}

/* ── INPUT CLEAR ON FOCUS ── */
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('focus', () => inp.classList.remove('error'));
});
</script>
</body>
</html>
