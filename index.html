<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMC | Intelligence in Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:    #080809;
    --card-bg:  #0e0e11;
    --border:   rgba(255,255,255,0.07);
    --silver:   #c8cdd4;
    --silver-hi:#e8edf2;
    --silver-lo:#7a8390;
    --white:    #f0f2f4;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  #net-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03; pointer-events: none; z-index: 1;
  }

  .stage {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }

  .card {
    width: 100%; max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 52px 44px 44px;
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.025), 0 40px 80px rgba(0,0,0,0.75);
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,200,220,0.35), transparent);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─────────────────────────────────────────
     TMC — RELEVO METÁLICO CSS PURO
     3 camadas sobrepostas:
     1. tmc-shadow  → sombra projetada diagonal
     2. tmc-main    → metal escovado gradiente
     3. tmc-light   → faixa de luz passando
  ───────────────────────────────────────── */
  .logo-block {
    text-align: center;
    margin-bottom: 38px;
    animation: rise 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .tmc-wrap {
    position: relative;
    display: inline-block;
    line-height: 1;
  }

  .tmc-shadow,
  .tmc-main,
  .tmc-light {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(70px, 14vw, 94px);
    letter-spacing: 0.12em;
    line-height: 1;
    display: block;
  }

  /* Camada 1 — sombra projetada (baixo-esquerda) */
  .tmc-shadow {
    position: absolute;
    top: 7px; left: -5px;
    color: #000;
    text-shadow:
      -4px 6px 10px rgba(0,0,0,1),
      -2px 3px  5px rgba(0,0,0,0.8),
       0px 2px  3px rgba(0,0,0,0.6);
    user-select: none;
    pointer-events: none;
    z-index: 0;
    opacity: 0.9;
    filter: blur(3px);
  }

  /* Camada 2 — metal escovado */
  .tmc-main {
    position: relative;
    z-index: 1;
    background: linear-gradient(
      180deg,
      #243038  0%,
      #4e6472  7%,
      #7a9aaa  16%,
      #aac0cc  25%,
      #ccdae4  33%,
      #e8f2f6  40%,
      #f8fcfe  46%,
      #ffffff  50%,
      #f2f8fa  54%,
      #daeaf2  61%,
      #b0c8d4  70%,
      #7a9aaa  80%,
      #4e6472  90%,
      #1e2c38  100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter:
      drop-shadow(0 -1.5px 0 rgba(255,255,255,0.55))
      drop-shadow(0  1.5px 0 rgba(0,0,0,0.95))
      drop-shadow(0  3px   3px rgba(0,0,0,0.5));
  }

  /* Camada 3 — faixa de luz varrendo */
  .tmc-light {
    position: absolute;
    inset: 0;
    z-index: 2;
    user-select: none;
    pointer-events: none;
    background: linear-gradient(
      106deg,
      transparent               0%,
      transparent              34%,
      rgba(255,255,255,0.00)   43%,
      rgba(210,235,248,0.35)   47%,
      rgba(255,255,255,0.75)   50%,
      rgba(255,255,255,0.88)   51%,
      rgba(210,235,248,0.35)   54%,
      rgba(255,255,255,0.00)   59%,
      transparent              67%,
      transparent             100%
    );
    background-size: 340% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: light-sweep 7s cubic-bezier(0.25,0.46,0.45,0.94) infinite 3.5s;
  }

  @keyframes light-sweep {
    0%   { background-position: -240% 0; opacity: 0; }
    4%   { opacity: 1; }
    44%  { background-position: 340% 0; opacity: 1; }
    49%  { opacity: 0; }
    100% { background-position: 340% 0; opacity: 0; }
  }

  .tagline {
    font-size: 9.5px; font-weight: 400;
    letter-spacing: 0.38em; color: var(--silver-lo);
    text-transform: uppercase;
    display: block; margin-top: 10px;
  }

  /* ── FORM ── */
  .access-label {
    font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.32em; color: var(--silver-lo);
    text-transform: uppercase;
    margin-bottom: 20px; display: block;
    animation: rise 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .form { animation: rise 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) both; }
  .field { margin-bottom: 12px; }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    color: #e8edf2 !important;
    -webkit-text-fill-color: #e8edf2 !important;
    caret-color: #e8edf2;
    font-family: 'Barlow', sans-serif;
    font-size: 13px; letter-spacing: 0.03em;
    padding: 14px 16px; outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  }

  /* Fix autofill Chrome — fundo branco assassino */
  .field input:-webkit-autofill,
  .field input:-webkit-autofill:hover,
  .field input:-webkit-autofill:focus,
  .field input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 1000px #141418 inset !important;
    -webkit-text-fill-color: #e8edf2 !important;
    border-color: rgba(150,180,205,0.3) !important;
    transition: background-color 9999s ease-in-out 0s;
  }

  .field input::placeholder {
    color: rgba(180,190,200,0.28);
    font-size: 12px; letter-spacing: 0.06em;
  }

  .field input:focus {
    border-color: rgba(150,180,205,0.4);
    background: rgba(255,255,255,0.07) !important;
    box-shadow: 0 0 0 3px rgba(100,150,190,0.07);
  }

  .btn-primary {
    width: 100%; margin-top: 10px; padding: 15px;
    background: linear-gradient(135deg, #1a2530 0%, #243040 50%, #182028 100%);
    border: 1px solid rgba(150,180,205,0.28);
    border-radius: 3px; color: var(--silver-hi);
    font-family: 'Barlow', sans-serif;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.34em; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s ease;
    position: relative; overflow: hidden;
  }

  .btn-primary:hover {
    border-color: rgba(170,200,220,0.5); color: #fff;
    box-shadow: 0 4px 20px rgba(80,130,170,0.12);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  .divider {
    display: flex; align-items: center;
    gap: 12px; margin: 26px 0 20px; opacity: 0.35;
  }
  .divider span { flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
  .divider em { font-style: normal; font-size: 10px; letter-spacing: 0.2em; color: var(--silver-lo); }

  .form-footer {
    text-align: center; font-size: 12px; color: var(--silver-lo);
    animation: rise 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  .form-footer a {
    color: var(--silver); text-decoration: none; font-weight: 500;
    border-bottom: 1px solid rgba(180,195,210,0.3); padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .form-footer a:hover { color: var(--silver-hi); border-color: rgba(220,230,240,0.55); }

  .error-msg { font-size: 11px; color: #e07070; margin-top: 8px; display: none; }
  .error-msg.visible { display: block; }

  .btn-primary .spinner {
    display: none; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--silver-hi);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  .btn-primary.loading .spinner { display: inline-block; }
  .btn-primary.loading .btn-text { opacity: 0.55; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── THINK MOVE CONVERT — PRATA FLUINDO ── */
  .bottom-mark {
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(-50%);
    font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.42em; text-transform: uppercase;
    white-space: nowrap; z-index: 3;
    background: linear-gradient(
      90deg,
      #4a5a62  0%,
      #7a9098  12%,
      #aac0c8  26%,
      #d0e0e6  38%,
      #eef6f8  46%,
      #ffffff  50%,
      #eef6f8  54%,
      #d0e0e6  62%,
      #aac0c8  74%,
      #7a9098  88%,
      #4a5a62  100%
    );
    background-size: 230% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: silver-flow 5s linear infinite;
  }

  @keyframes silver-flow {
    0%   { background-position: 0% center; }
    100% { background-position: 230% center; }
  }

  @media (max-width: 480px) {
    .card { padding: 40px 26px 36px; }
  }
</style>
</head>
<body>

<canvas id="net-canvas"></canvas>

<div class="stage">
  <div class="card">

    <div class="logo-block">
      <div class="tmc-wrap">
        <span class="tmc-shadow" aria-hidden="true">TMC</span>
        <span class="tmc-main">TMC</span>
        <span class="tmc-light" aria-hidden="true">TMC</span>
      </div>
      <span class="tagline">Intelligence in Motion</span>
    </div>

    <span class="access-label">Acesso à Plataforma</span>

    <form class="form" id="loginForm" onsubmit="handleLogin(event)" autocomplete="on">
      <div class="field">
        <input type="email" id="email" name="email"
          placeholder="E-mail corporativo"
          autocomplete="email" spellcheck="false">
      </div>
      <div class="field">
        <input type="password" id="password" name="password"
          placeholder="Senha" autocomplete="current-password">
      </div>
      <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>
      <button type="submit" class="btn-primary" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">Entrar no Sistema</span>
      </button>
    </form>

    <div class="divider">
      <span></span><em>ou</em><span></span>
    </div>

    <div class="form-footer">
      Novo por aqui? <a href="#">Cadastrar nova empresa</a>
    </div>

  </div>
</div>

<div class="bottom-mark">Think &nbsp;·&nbsp; Move &nbsp;·&nbsp; Convert</div>

<script>
(function () {
  const canvas = document.getElementById('net-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, nodes = [];
  const COUNT = 50, MAX_DIST = 155;

  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  function init() {
    nodes = Array.from({ length: COUNT }, () => ({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.4+.4
    }));
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    for (const n of nodes) {
      n.x += n.vx; n.y += n.vy;
      if (n.x<0||n.x>W) n.vx*=-1;
      if (n.y<0||n.y>H) n.vy*=-1;
    }
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.hypot(dx,dy);
      if (d<MAX_DIST) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle=`rgba(100,128,150,${(1-d/MAX_DIST)*.18})`;
        ctx.lineWidth=.55; ctx.stroke();
      }
    }
    for (const n of nodes) {
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle='rgba(108,135,155,0.42)'; ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();});
  resize(); init(); draw();
})();

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  err.classList.remove('visible');
  btn.classList.add('loading'); btn.disabled = true;
  setTimeout(() => {
    btn.classList.remove('loading'); btn.disabled = false;
    // err.classList.add('visible');
    // window.location.href = '/dashboard';
  }, 1800);
}
document.querySelectorAll('input').forEach(i=>i.addEventListener('focus',()=>i.classList.remove('error')));
</script>
</body>
</html>
